# ============================================================================
# VMaNGOS Realm/Login Server Configuration (realmd.conf)
# ============================================================================
# Adapted from: mserajnik/vmangos-deploy config/realmd.conf.example
# Customized for: vmangos-classic parallel test deployment (TASK-070)
#
# Database host: vmangos-db (Docker service name)
# ============================================================================

[RealmdConf]
ConfVersion=2024091701

###############################################################################
# REALMD SETTINGS
###############################################################################

# Database connection: hostname;port;username;password;database
LoginDatabaseInfo = "vmangos-db;3306;mangos;mangos;realmd"

LogsDir = "/opt/vmangos/storage/logs"
PatchesDir = "./patches"
MaxPingTime = 30
RealmServerPort = 3724
BindIP = "0.0.0.0"
TrustedProxyServers = ""

PidFile = ""
LogLevel.Console = 2
LogLevel.File = 2
LogTime = 0
LogFile = "Realmd.log"
LogTimestamp = 0
LogFileLevel = 0

UseProcessors = 0
ProcessPriority = 1
WaitAtStartupError = 5

MinRealmListDelay = 1
RealmsStateUpdateDelay = 20

WrongPass.MaxCount = 0
WrongPass.BanTime = 600
WrongPass.BanType = 0

ReqEmailVerification = 0
ReqEmailSince = 0
GeoLocking = 0
StrictVersionCheck = 1
SendMail = 0
MailFrom = ""
MailCertChecks = 1
SendGridKey = ""
GeolockGUID = ""
MaxSessionDuration = 300
